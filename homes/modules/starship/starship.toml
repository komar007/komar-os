"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 10
add_newline = false

continuation_prompt = "[ ‚Ēä ](blue)"

format = '''
$character$status([Óāį](bg:236 fg:16)${env_var.PS1_EXTRA}[Óāį](fg:236))([Óāį](bg:236 fg:16)$git_branch$git_metrics[Óāį](fg:236))([Óāį](bg:236 fg:16)$direnv[Óāį](fg:236))([Óāį](bg:236 fg:16)${env_var.NIX_SHELL_NAME}[Óāį](fg:236))([Óāį](bg:236 fg:16)$python[Óāį](fg:236)) $username[@](0)$hostname[:](0)$directory$fill$cmd_duration${env_var._LAST_COMMAND_ID}$time [Óā≤](241)
 [\$ ](bold blue)
'''

[character]
format = "$symbol"
success_symbol = "[Óāį](fg:241)"
error_symbol = ""

[direnv]
disabled = false
format = "[$symbol $allowed]($style)"
style = "bold bg:236 fg:blue"
symbol = "ůįĆ™"
allowed_msg = "‚úď"
not_allowed_msg = "‚úó"
denied_msg = "ÔÄ£ "

[status]
format = "[$status]($style)[Óāį]($style inverted)"
success_style = "fg:241"
failure_style = "bg:red fg:16"
disabled = false

[env_var.PS1_EXTRA]
format = "[$env_value]($style)"
style = "bg:236"

[env_var.NIX_SHELL_NAME]
format = "[ůĪĄÖ ](bg:236 fg:4)[$env_value]($style)"
style = "bg:236 fg:249"

[python]
format = "[$symbol](bg:236 fg:#ffde57)[($virtualenv)]($style)"
style = "bg:236 fg:249"
version_format = "${raw}"
symbol = " ůįĆ† "

[git_branch]
format = "[$symbol $branch]($style)"
style = "bg:236 fg:yellow"
symbol = "__should_be_overridden__"

[git_metrics]
disabled = false
format = "([ ÔÉĺ $added]($added_style))([ ÔÖÜ $deleted]($deleted_style))"
added_style = "bg:236 fg:green"
deleted_style = "bg:236 fg:red"

[username]
show_always = true
format = "[$user](green)"

[hostname]
ssh_only = false
ssh_symbol = "[ssh:](fg)"
format = "[$ssh_symbol$hostname](green)"

[directory]
style = "blue"
repo_root_format = '[$before_root_path]($before_repo_root_style)[ůį≥Ź $repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) '
repo_root_style = "fg:blue bg:237"
before_repo_root_style = "dimmed blue"
truncate_to_repo = false
truncation_length = 1000
read_only = " ÔÄ£"

[env_var._LAST_COMMAND_ID]
format = "[ ůįŅÄ $env_value ]($style)[‚Ēą‚Ēą](240)"
style = "0"

[time]
format = " [$time]($style)"
style = "0"
disabled = false

[fill]
symbol = '‚Ēą'
style = "240"

[cmd_duration]
format = " [Ó≠ľ $duration ]($style)[‚Ēą‚Ēą](240)"
style = "0"
min_time = 1
show_milliseconds = true
